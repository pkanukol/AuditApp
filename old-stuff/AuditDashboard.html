<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Harvest International School</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:#0a1a0a;min-height:100vh;color:#fff;overflow-x:hidden;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0a1a0a,#0f2410);border-bottom:2px solid #2D6A2D;
  padding:12px 20px;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:38px;height:38px;object-fit:contain;border-radius:6px;}
.hdr-school{font-family:"DM Serif Display",serif;font-size:14px;color:#29ABE2;line-height:1.2;}
.hdr-sub{font-size:9px;color:rgba(255,255,255,0.4);margin-top:2px;letter-spacing:0.07em;text-transform:uppercase;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.auditor-chip{background:rgba(41,171,226,0.12);border:1px solid rgba(41,171,226,0.3);
  border-radius:30px;padding:5px 12px;font-size:11px;color:#29ABE2;font-weight:600;
  max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-hdr{border-radius:30px;padding:6px 14px;font-family:"DM Sans",sans-serif;
  font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:none;transition:all 0.2s;}
.btn-entry{background:rgba(41,171,226,0.15);border:1px solid rgba(41,171,226,0.35);color:#29ABE2;}
.btn-logout{background:rgba(232,64,28,0.15);border:1px solid rgba(232,64,28,0.38);color:#E8401C;}

/* BODY */
.body{max-width:640px;margin:0 auto;padding:28px 20px 60px;}

/* LOCATION SWITCH */
.loc-wrap{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.loc-label{font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.1em;color:rgba(255,255,255,0.36);}
.loc-toggle{display:flex;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);border-radius:40px;padding:3px;gap:3px;}
.loc-btn{padding:8px 24px;border-radius:36px;border:none;cursor:pointer;
  font-family:"DM Sans",sans-serif;font-size:13px;font-weight:700;
  transition:all 0.22s;background:transparent;color:rgba(255,255,255,0.4);}
.loc-btn.active{background:linear-gradient(135deg,#2D6A2D,#4a8c4a);
  color:#fff;box-shadow:0 2px 14px rgba(45,106,45,0.45);}
.loc-btn:not(.active):hover{color:rgba(255,255,255,0.75);}

/* MSG / LOADING */
.msg{text-align:center;padding:48px 20px;color:rgba(255,255,255,0.4);font-size:14px;}
.spinner{display:inline-block;width:24px;height:24px;
  border:3px solid rgba(41,171,226,0.2);border-top-color:#29ABE2;
  border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TEACHER CARDS */
.list-wrap{display:flex;flex-direction:column;gap:10px;}
.teacher-card{background:rgba(248,253,248,0.97);border-radius:12px;
  border:1px solid rgba(45,106,45,0.18);padding:16px 18px;
  cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:14px;}
.teacher-card:hover{border-color:#29ABE2;box-shadow:0 4px 18px rgba(0,0,0,0.28);transform:translateY(-1px);}
.card-left{flex:1;min-width:0;}
.t-name{font-family:"DM Serif Display",serif;font-size:17px;color:#1a2a1a;
  line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-meta{font-size:11px;color:#7a9a7a;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.t-subj{background:#e8f4fd;color:#1a4a6c;border-radius:6px;padding:2px 8px;font-weight:600;font-size:10px;}
.t-obs{color:#7a9a7a;}
.rating-tag{font-size:9px;font-weight:700;letter-spacing:0.05em;padding:2px 8px;
  border-radius:10px;text-transform:uppercase;}
.rt-dist{background:#e8f8e8;color:#1a5a1a;}
.rt-prof{background:#e8f4fd;color:#1a4a6c;}
.rt-dev {background:#fffbe8;color:#7a6000;}
.rt-beg {background:#ffeee8;color:#8a2000;}
.card-right{text-align:center;flex-shrink:0;}
.t-score-num{font-family:"DM Serif Display",serif;font-size:30px;line-height:1;}
.t-score-denom{font-size:11px;color:#7a9a7a;margin-top:1px;}
.sc-dist{color:#1a5c1a;} .sc-prof{color:#1a4a6c;} .sc-dev{color:#7a6000;} .sc-beg{color:#8a2000;}
.card-arrow{font-size:16px;color:#c4d4c4;margin-left:6px;flex-shrink:0;}
.card-disabled{opacity:0.45;cursor:not-allowed !important;}
.card-disabled:hover{transform:none !important;box-shadow:none !important;}

/* ── DETAIL OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;}
.overlay.open{display:block;}
/* Panel: light grey background, wider */
.detail-panel{position:fixed;top:0;right:-100%;bottom:0;width:min(820px,100vw);
  background:#0d1f0d;border-left:3px solid #2D6A2D;z-index:101;
  overflow-y:auto;transition:right 0.3s cubic-bezier(0.4,0,0.2,1);}
.detail-panel.open{right:0;}

/* Header: white strip */
.dp-header{padding:16px 22px 14px;border-bottom:2px solid #2D6A2D;
  position:sticky;top:0;background:#0d1f0d;z-index:1;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.dp-name{font-family:"DM Serif Display",serif;font-size:22px;color:#ffffff;line-height:1.2;}
.dp-meta{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px;}
.dp-close{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50%;
  width:34px;height:34px;color:#ffffff;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dp-close:hover{background:rgba(255,255,255,0.2);}

.dp-body{padding:18px 22px 40px;}

/* Summary score — keep dark card */
.dp-score-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;
  background:#1a3a1a;border-radius:12px;padding:16px;}
.dp-big-score{font-family:"DM Serif Display",serif;font-size:56px;line-height:1;color:#fff;filter:brightness(1.3);}
.dp-score-info{flex:1;}
.dp-rating{font-size:10px;font-weight:700;letter-spacing:0.07em;padding:4px 12px;
  border-radius:10px;display:inline-block;margin-bottom:6px;text-transform:uppercase;}
.dp-score-sub{font-size:12px;color:rgba(255,255,255,0.80);}

/* Section titles */
.dp-section-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.09em;color:#7fff7f;border-bottom:1px solid rgba(45,106,45,0.4);
  padding-bottom:5px;margin:22px 0 12px;}

/* Domain bars — keep dark card */
.domain-bars{display:flex;flex-direction:column;gap:12px;margin-bottom:4px;}
.dbar-row{display:flex;flex-direction:column;gap:4px;}
.dbar-label{font-size:13px;color:#2D6A2D;font-weight:800;letter-spacing:0.01em;}
.dbar-track{height:10px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;}
.dbar-fill{height:100%;border-radius:4px;}
.dbar-val{font-size:12px;color:#2D6A2D;font-weight:800;}

/* Observation cards — keep dark */
.obs-card{background:#1a3a1a;border:1px solid rgba(45,106,45,0.5);
  border-radius:12px;padding:16px 18px;margin-bottom:14px;}
.obs-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px;}
.obs-date{font-size:13px;font-weight:700;color:#fff;}
.obs-auditor{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.obs-score-badge{border-radius:8px;padding:6px 12px;font-family:"DM Serif Display",serif;
  font-size:20px;font-weight:800;border:1px solid rgba(255,255,255,0.35);color:#fff;}
.obs-params{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.obs-param{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;}
.op-val{font-family:"DM Serif Display",serif;font-size:22px;line-height:1;flex-shrink:0;color:#ffffff8c;}
.op-lbl{font-size:11px;color:rgba(255,255,255,0.85);line-height:1.35;text-align:right;}

.obs-remarks{font-size:12px;color:#ffd080;font-weight:600;margin-top:8px;line-height:1.5;
  border-left:3px solid #E8401C;padding-left:10px;}
.obs-feedback{font-size:11px;color:rgba(255,255,255,0.7);margin-top:8px;line-height:1.6;
  background:rgba(0,0,0,0.3);border-radius:6px;padding:8px 10px;max-height:160px;overflow-y:auto;}
.obs-teacher-remarks{font-size:12px;color:#90d0ff;margin-top:8px;
  font-style:italic;border-left:2px solid #29ABE2;padding-left:10px;line-height:1.5;}

/* PRINT BUTTON */
.btn-print{background:rgba(41,171,226,0.15);border:1px solid rgba(41,171,226,0.35);
  border-radius:20px;padding:6px 14px;font-family:"DM Sans",sans-serif;
  font-size:11px;font-weight:600;color:#29ABE2;cursor:pointer;
  white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.btn-print:hover{background:rgba(41,171,226,0.28);}

/* FEEDBACK TOGGLE */
.feedback-toggle{display:flex;align-items:center;gap:8px;margin-top:10px;cursor:pointer;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  border-radius:7px;padding:9px 12px;transition:background 0.15s;}
.feedback-toggle:hover{background:rgba(255,255,255,0.14);}
.feedback-toggle-icon{font-size:12px;color:rgba(255,255,255,0.5);transition:transform 0.2s;flex-shrink:0;}
.feedback-toggle-icon.open{transform:rotate(90deg);}
.feedback-toggle-label{font-size:12px;color:rgba(255,255,255,0.75);flex:1;font-weight:600;}
.feedback-body{display:none;margin-top:8px;}
.feedback-body.open{display:block;}

/* Editable fields (draft mode) */
.edit-label{font-size:11px;font-weight:700;color:#90d080;text-transform:uppercase;
  letter-spacing:0.06em;margin:10px 0 5px;}
.edit-field{width:100%;padding:10px 12px;font-family:"DM Sans",sans-serif;
  font-size:13px;color:#e8ffe8;line-height:1.65;background:#162a16;
  border:1px solid rgba(255,255,255,0.2);border-radius:7px;resize:vertical;
  outline:none;box-sizing:border-box;transition:border-color 0.2s;}
.edit-field:focus{border-color:#29ABE2;box-shadow:0 0 0 3px rgba(41,171,226,0.15);}
.edit-field-ro{width:100%;padding:10px 12px;font-family:"DM Sans",sans-serif;
  font-size:13px;color:rgba(255,255,255,0.88);line-height:1.65;
  background:#162a16;border:1px solid rgba(255,255,255,0.15);
  border-radius:7px;white-space:pre-wrap;word-break:break-word;
  box-sizing:border-box;min-height:44px;}
.btn-save-all{width:100%;padding:12px;margin-top:14px;
  background:linear-gradient(135deg,#2D6A2D,#4a8c4a);
  border:none;border-radius:9px;color:#fff;font-family:"DM Sans",sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.03em;
  box-shadow:0 3px 10px rgba(45,106,45,0.35);transition:all 0.2s;}
.btn-save-all:hover{background:linear-gradient(135deg,#246024,#3a7c3a);}
.btn-save-all:disabled{opacity:0.5;cursor:not-allowed;}
.save-all-msg{font-size:12px;font-weight:700;text-align:center;margin-top:8px;min-height:18px;}
.save-all-msg.ok{color:#7fff7f;}
.save-all-msg.err{color:#ff9090;}

/* PRINT STYLES */
@media print {
  /* ── Page setup ── */
  @page { margin: 16mm 14mm; }
  body { background:#fff !important; color:#000 !important; }
  body::before { display:none !important; }

  /* ── Hide everything except the detail panel ── */
  .hdr,.body,.overlay { display:none !important; }
  .btn-print,.dp-close { display:none !important; }
  .feedback-toggle { display:none !important; }

  /* ── Panel becomes full-width white page ── */
  .detail-panel { position:static !important; right:0 !important;
    width:100% !important; border:none !important;
    background:#fff !important; overflow:visible !important; }

  /* ── Header: green banner ── */
  .dp-header { position:static !important;
    background:#2D6A2D !important; color:#fff !important;
    padding:14px 18px 12px !important; border-radius:0 !important;
    border:none !important; margin-bottom:16px !important; }
  .dp-name { color:#000 !important; font-size:22px !important; }
  .dp-meta { color:rgba(255,255,255,0.75) !important; }

  /* ── Section titles: orange ── */
  .dp-section-title { color:#E8401C !important; font-size:11px !important;
    border-bottom:1px solid #E8401C !important; padding-bottom:4px !important;
    margin:18px 0 10px !important; }

  /* ── Body padding ── */
  .dp-body { padding:0 18px 24px !important; color:#000 !important;}

  /* ── Summary score box: light green ── */
  .dp-score-row { background:#e8f5e8 !important; border:1px solid #2D6A2D !important;
    border-radius:8px !important; padding:14px !important; }
  .dp-big-score { color:#2D6A2D !important; }
  .dp-score-sub { color:#555 !important; }
  .dp-rating { background:#2D6A2D !important; color:#fff !important; }

  /* ── Domain bars ── */
  .dbar-label { color:#2D6A2D !important; font-weight:700 !important; }
  .dbar-track { background:#e0ece0 !important; }
  .dbar-val { color:#555 !important; }

  /* ── Progress comparison box ── */
  .compare-box { background:#fff8e8 !important;
    border:1px solid #E8401C !important; border-radius:8px !important;
    padding:14px !important; }
  .cmp-domain-label { color:#E8401C !important; font-weight:700 !important; }
  .cmp-bar-track { background:#ffe8d4 !important; }
  .cmp-bar-val { color:#333 !important; }
  .cmp-legend-item { color:#333 !important; }

  /* ── Observation cards ── */
  .obs-card { background:#f4faf4 !important; border:1px solid #2D6A2D !important;
    border-radius:6px !important; padding:12px !important;
    break-inside:avoid; page-break-inside:avoid; margin-bottom:12px !important; }
  .obs-date { color:#2D6A2D !important; font-weight:700 !important; font-size:13px !important; }
  .obs-auditor { color:#555 !important; }

  /* Score badge: keep green/amber/red colour coding */
  .obs-score-badge { border:1px solid #ccc !important; border-radius:6px !important; }
  .sc-dist { color:#1a5c1a !important; } .sc-prof { color:#1a4a6c !important; }
  .sc-dev  { color:#7a6000 !important; } .sc-beg  { color:#8a2000 !important; }

  /* Rating tags */
  .rt-dist { background:#e8f8e8 !important; color:#1a5a1a !important; }
  .rt-prof { background:#e8f0fd !important; color:#1a4a6c !important; }
  .rt-dev  { background:#fffbe8 !important; color:#7a6000 !important; }
  .rt-beg  { background:#ffeee8 !important; color:#8a2000 !important; }

  /* ── Param grid ── */
  .obs-params { grid-template-columns:repeat(2,1fr) !important; }
  .obs-param { background:#fff !important; border:1px solid #d4e4d4 !important;
    border-left:3px solid #2D6A2D !important; border-radius:6px !important; }
  .op-val { color: #1a2a1a !important; }
  .op-lbl { color:#555 !important; }

  /* ── Remarks & Objective Observations ── */
  .obs-remarks { color:#1a2a1a !important; font-weight:600 !important; }
  .obs-teacher-remarks { color:#1a4a6c !important;
    border-left-color:#1a4a6c !important; }

  /* ── Objective Observations ── */
  .obs-remarks { color:#1a2a1a !important; font-size:12px !important; }

  /* ── AI Feedback ── */
  .obs-feedback,.feedback-body { display:block !important;
    color:#1a1a1a !important; background:#fff8f0 !important;
    border:1px solid #E8401C !important; border-radius:6px !important;
    padding:10px 12px !important; white-space:pre-wrap !important;
    font-size:11px !important; line-height:1.7 !important; }
  /* Text inside editable/read-only feedback fields */
  .edit-field, .edit-field-ro { color:#1a1a1a !important;
    background:#fff8f0 !important; font-size:11px !important;
    line-height:1.7 !important; white-space:pre-wrap !important; }
  /* Any textarea showing feedback */
  .obs-feedback textarea, .feedback-body textarea { color:#1a1a1a !important; }
}

/* PROGRESS COMPARISON CHART */
.compare-box{background:#1a3a1a;border:1px solid rgba(45,106,45,0.5);
  border-radius:12px;padding:16px;margin-bottom:20px;}
.cmp-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.cmp-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.65);}
.cmp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cmp-domain{margin-bottom:14px;}
.cmp-domain:last-child{margin-bottom:0;}
.cmp-domain-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.7);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.cmp-bars{display:flex;flex-direction:column;gap:5px;}
.cmp-bar-row{display:flex;align-items:center;gap:8px;}
.cmp-bar-date{font-size:10px;color:rgba(255,255,255,0.5);width:88px;flex-shrink:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cmp-bar-track{flex:1;height:14px;background:rgba(255,255,255,0.12);border-radius:4px;overflow:hidden;}
.cmp-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.cmp-bar-val{font-size:11px;font-weight:700;color:#fff;width:36px;
  text-align:right;flex-shrink:0;}

/* draft status badge on teacher card */
.status-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;
  border-radius:8px;text-transform:uppercase;letter-spacing:0.05em;margin-left:6px;vertical-align:middle;}
.status-draft{background:rgba(245,166,35,0.15);color:#b87800;border:1px solid rgba(245,166,35,0.4);}
.status-saved{background:#d4f0d4;color:#1a5c1a;border:1px solid #7ac47a;}
</style>
</head>
<body>

<div class="hdr">

<script>
var activeLoc   = 'Kodathi';
var teacherData = [];
var allCards    = [];   // flat list: one entry per row
var auditorName = '';   // logged-in user name
var auditorRole = 'auditor';
var auditorSme  = '';

window.onload = function() {
  // Read session stored by storeSessionAndGetUrl — includes role, location, sme
  try {
    google.script.run
      .withSuccessHandler(function(session) {
        var name = (session && session.name)     || 'Auditor';
        auditorName  = name;
        auditorSme   = (session && session.sme)  || '';
        auditorRole  = (session && session.role) || 'auditor';
        var loc  = (session && session.location) || 'Kodathi';
        document.getElementById('auditorChip').textContent = name;
        // Set correct location toggle based on session
        var startLoc = (loc === 'Attibele') ? 'Attibele' : 'Kodathi';
        activeLoc = startLoc;
        document.getElementById('locKodathi').classList.toggle('active',  startLoc === 'Kodathi');
        document.getElementById('locAttibele').classList.toggle('active', startLoc === 'Attibele');
        fetchData(startLoc);
      })
      .withFailureHandler(function() {
        document.getElementById('auditorChip').textContent = 'Auditor';
        fetchData('Kodathi');
      })
      .getSession();
  } catch(e) {
    fetchData('Kodathi');
  }
};

function switchLoc(loc) {
  if (loc === activeLoc) return;
  activeLoc = loc;
  document.getElementById('locKodathi').classList.toggle('active',  loc === 'Kodathi');
  document.getElementById('locAttibele').classList.toggle('active', loc === 'Attibele');
  fetchData(loc);
}

function fetchData(loc) {
  teacherData = [];
  document.getElementById('listArea').innerHTML =
    '<div class="msg"><span class="spinner"></span>Loading ' + loc + '...</div>';
  try {
    google.script.run
      .withSuccessHandler(function(result) {
        if (!result || result.success === false) {
          document.getElementById('listArea').innerHTML =
            '<div class="msg">Error: ' + ((result && result.error) || 'Could not load data') + '</div>';
          return;
        }
        teacherData = result.teachers || [];
        renderList(teacherData, loc);
      })
      .withFailureHandler(function(err) {
        document.getElementById('listArea').innerHTML =
          '<div class="msg">Error: ' + ((err && err.message) || String(err)) + '</div>';
      })
      .getTeacherScores(loc, auditorSme);
  } catch(e) {
    document.getElementById('listArea').innerHTML = '<div class="msg">Error: ' + e.message + '</div>';
  }
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────────
// One card per unique Teacher+Auditor+Grade row.
// All cards are clickable (everyone can view).
// SME: only clicks own audited cards; others are greyed with tooltip.
function renderList(teachers, loc) {
  // Flatten all rows into allCards
  allCards = [];
  teachers.forEach(function(t) {
    (t.rows || []).forEach(function(r) {
      allCards.push({ teacherName: t.teacherName, subject: t.subject, row: r });
    });
  });

  if (!allCards.length) {
    document.getElementById('listArea').innerHTML =
      '<div class="msg">No data available for ' + loc + '.</div>';
    return;
  }

  var html = '<div class="list-wrap">';
  for (var ci = 0; ci < allCards.length; ci++) {
    var card = allCards[ci];
    var r    = card.row;
    var s    = r.overall || 0;
    var scC  = s >= 25 ? 'sc-dist' : s >= 19 ? 'sc-prof' : s >= 13 ? 'sc-dev' : 'sc-beg';
    var rtC  = ratingClass(r.rating);
    var isDraft = (String(r.draft || '').toLowerCase() === 'yes');

    // SME can only click cards they audited; all others can click everything
    var isSme     = (auditorRole === 'sme');
    var rowAud    = String(r.auditor || '').trim().toLowerCase();
    var clickable = !isSme || (rowAud === auditorName.trim().toLowerCase());

    html +=
      '<div class="teacher-card' + (clickable ? '' : ' card-disabled') + '" id="tcard-' + ci + '"' +
        (clickable ? ' onclick="openCard(' + ci + ')"' : ' title="Audited by ' + esc(r.auditor || '') + '"') + '>' +
        '<div class="card-left">' +
          '<div class="t-name">' + esc(card.teacherName) +
            (isDraft
              ? ' <span class="status-badge status-draft">Draft</span>'
              : ' <span class="status-badge status-saved">Saved</span>') +
          '</div>' +
          '<div class="t-meta">' +
            (card.subject ? '<span class="t-subj">' + esc(card.subject) + '</span>' : '') +
            (r.grade ? '<span class="t-obs">&#127979; ' + esc(r.grade) + '</span>' : '') +
            '<span class="t-obs">&#128110; ' + esc(r.auditor || '') + '</span>' +
            (r.rating ? '<span class="rating-tag ' + rtC + '">' + esc(r.rating) + '</span>' : '') +
          '</div>' +
          '<div class="t-meta" style="margin-top:2px;font-size:11px;color:#7a9a7a;">&#128197; ' + esc(r.date || '') + '</div>' +
        '</div>' +
        '<div class="card-right">' +
          '<div class="t-score-num ' + scC + '">' + s + '</div>' +
          '<div class="t-score-denom">/ 28</div>' +
        '</div>' +
        '<div class="card-arrow">&#8250;</div>' +
      '</div>';
  }
  html += '</div>';
  document.getElementById('listArea').innerHTML = html;
}

// ── OPEN CARD (single row) ────────────────────────────────────────────────────

  var scC  = r.overall >= 25 ? 'sc-dist' : r.overall >= 19 ? 'sc-prof' : r.overall >= 13 ? 'sc-dev' : 'sc-beg';
  var rtC  = ratingClass(r.rating);

  // Score summary

    '</div>';

    param('Questioning &amp; Discussion Techniques', r.p31) +

    html += '<div class="obs-teacher-remarks">&#128100; Teacher: ' + esc(r.teacherRemarks) + '</div>';

  // canEdit: draft=Yes AND not teacher AND this row's auditor = logged-in user
  var isDraft  = (String(r.draft || '').toLowerCase() === 'yes');
  var rowAud   = String(r.auditor || '').trim().toLowerCase();

  html += '<div class="edit-label">&#128065; Objective Observations</div>';
  html += canEdit

      '<span class="feedback-toggle-label">&#129302; AI Feedback &#8212; ' + (canEdit ? 'tap to expand / edit' : 'tap to expand') + '</span>' +
    '</div>' +
    '<div class="feedback-body" id="' + fbId + '">' +

        '&#128190; Save &amp; Finalise' +

  document.getElementById('overlay').classList.add('open');

    html += '<div class="obs-card">';

    // Top row: date + auditor + score badge
    html +=
      '<div class="obs-top">' +
        '<div>' +
          '<div class="obs-date">' + esc(r.date) + '</div>' +
          '<div class="obs-auditor">by ' + esc(r.auditor) + '</div>' +
        '</div>' +
        '<div>' +
          '<div class="obs-score-badge ' + rScC + '">' + r.overall + ' / 28</div>' +
          (r.rating ? '<div style="text-align:center;margin-top:3px"><span class="rating-tag ' + rRtC + '">' + esc(r.rating) + '</span></div>' : '') +
        '</div>' +
      '</div>';

    // Domain scores removed (shown in summary above)

    // Individual param scores with full names
    html +=
      '<div class="obs-params">' +
        param('Knowledge of Content &amp; Curriculum',  r.p11) +
        param('Alignment of Learning Outcomes',         r.p12) +
        param('Managing Classroom Procedures',          r.p21) +
        param('Questioning &amp; Discussion Techniques',r.p31) +
        param('Fostering Student Engagement',           r.p32) +
        param('Implementation of Process',              r.p33) +
        param('Effective Use of Technology',            r.p34) +
      '</div>';

    // Issues (read-only)
    if (r.infraIssues && r.infraIssues.trim())
      html += '<div class="obs-remarks">&#9888;&#65039; Infrastructure: ' + esc(r.infraIssues) + '</div>';
    if (r.otherIssues && r.otherIssues.trim())
      html += '<div class="obs-remarks">&#9888;&#65039; Other issues: ' + esc(r.otherIssues) + '</div>';
    if (r.teacherRemarks && r.teacherRemarks.trim())
      html += '<div class="obs-teacher-remarks">&#128100; Teacher: ' + esc(r.teacherRemarks) + '</div>';

    // Draft-aware: editable only if draft===Yes AND viewer is not a teacher
    var isDraft = (String(r.draft || '').toLowerCase() === 'yes');
    var canEdit = isDraft && (auditorRole !== 'teacher');
    var orId  = 'or_'  + idx + '_' + i;
    var taId  = 'fbt_' + idx + '_' + i;
    var msgId = 'msg_' + idx + '_' + i;
    var btnId = 'btn_' + idx + '_' + i;

    var rowI  = r.rowIndex || 0;

    // Objective Observations
    html += '<div class="edit-label">&#128065; Objective Observations</div>';
    html += canEdit
      ? '<textarea class="edit-field" id="' + orId + '" rows="3" placeholder="No observations recorded...">' + esc(r.otherRemarks || '') + '</textarea>'
      : '<div class="edit-field-ro">' + (r.otherRemarks ? esc(r.otherRemarks) : '<span style="opacity:0.4">None recorded</span>') + '</div>';

    // AI Feedback

      '</div>' +
      '<div class="feedback-body" id="' + fbId + '">' +

        ? '<textarea class="edit-field" id="' + taId + '" rows="7" placeholder="No AI feedback...">' + esc(r.feedback || '') + '</textarea>'
        : '<div class="edit-field-ro">' + (r.feedback ? esc(r.feedback) : '<span style="opacity:0.4">No feedback generated</span>') + '</div>'
      ) + '</div>';

          '&#128190; Save &amp; Finalise' +

    html += '</div>'; // obs-card
  }

  document.getElementById('dpBody').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
  document.body.style.overflow = 'hidden';

  // No async call needed — chart is built from existing data
}

// ── BUILD COMPARISON CHART ───────────────────────────────────────────────────
function buildComparisonChart(rows) {
  // Colour palette — one colour per observation (up to 6)
  var COLOURS = ['#29ABE2','#4a8c4a','#E8401C','#F5A623','#9B59B6','#1ABC9C'];

  // Short date: handles multiple en-IN formats from column A:
  //   New: "3 June 2026 10:30 am"    → parts: [3, June, 2026, 10:30, am]
  //   Old: "Fri, 3 June 2026 10:30"  → parts: [Fri,, 3, June, 2026, ...]
  //   Also: "Friday 3 June 2026"     → weekday + day + month + year
  var MONTHS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  function shortDate(d) {
    var s = String(d || '').trim();
    if (!s) return 'Obs';
    var parts = s.split(/[\s,]+/).filter(function(p){ return p.length > 0; });
    var day = '', mon = '', yr = '';
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      // Is it a month name?
      var mIdx = MONTHS.indexOf(p.substring(0,3).toLowerCase());
      if (mIdx >= 0) { mon = p.substring(0,3); continue; }
      // Is it a 4-digit year?
      if (/^\d{4}$/.test(p)) { yr = p.substring(2); continue; }
      // Is it a day number (1-31)?
      if (/^\d{1,2}$/.test(p) && parseInt(p,10) <= 31) { day = parseInt(p,10); continue; }
      // Skip weekday names and times
    }
    if (day && mon && yr)  return day + ' ' + mon + ' \'' + yr;
    if (day && mon)        return day + ' ' + mon;
    return s.substring(0, 9);
  }

  var domains = [
    { label: 'Domain 1 — Planning & Preparation', key: 'domain1', max: 8 },
    { label: 'Domain 2 — Classroom Environment',  key: 'domain2', max:  4 },
    { label: 'Domain 3 — Instruction & Implementation', key: 'domain3', max: 16 }
  ];

  var out = '<div class="compare-box">';

  // Legend: one dot per observation
  out += '<div class="cmp-legend">';
  for (var i = 0; i < rows.length; i++) {
    var col  = COLOURS[i % COLOURS.length];
    var lbl  = 'Obs ' + (i + 1) + ' (' + shortDate(rows[i].date) + ')';
    out += '<div class="cmp-legend-item">' +
      '<div class="cmp-dot" style="background:' + col + '"></div>' +
      esc(lbl) + '</div>';
  }
  out += '</div>';

  // One block per domain
  for (var d = 0; d < domains.length; d++) {
    var dom = domains[d];
    out += '<div class="cmp-domain">';
    out += '<div class="cmp-domain-label">' + esc(dom.label) + '</div>';
    out += '<div class="cmp-bars">';
    for (var r = 0; r < rows.length; r++) {
      var val  = Number(rows[r][dom.key]) || 0;
      var pct  = Math.round(val / dom.max * 100);
      var col  = COLOURS[r % COLOURS.length];
      var date = shortDate(rows[r].date);
      out += '<div class="cmp-bar-row">' +
        '<div class="cmp-bar-date">' + esc(date) + '</div>' +
        '<div class="cmp-bar-track">' +
          '<div class="cmp-bar-fill" style="width:' + pct + '%;background:' + col + '"></div>' +
        '</div>' +
        '<div class="cmp-bar-val">' + val + '<span style="opacity:0.4;font-size:9px"> /' + dom.max + '</span></div>' +
      '</div>';
    }
    out += '</div></div>';
  }

  out += '</div>';
  return out;
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  document.body.style.overflow = '';
}

function saveCard(orId, taId, msgId, btnId, tabName, rowIndex) {
  var orEl = document.getElementById(orId);
  var taEl = document.getElementById(taId);
  var msg  = document.getElementById(msgId);
  var btn  = document.getElementById(btnId);
  if (!tabName || !rowIndex) {
    msg.textContent = '✗ Missing info'; msg.className = 'save-all-msg err'; return;
  }
  var objText = orEl ? orEl.value : '';
  var fbText  = taEl ? taEl.value : '';
  btn.disabled = true; btn.textContent = 'Saving…';
  msg.textContent = ''; msg.className = 'save-all-msg';
  try {
    google.script.run
      .withSuccessHandler(function(r) {
        btn.disabled = false; btn.innerHTML = '&#128190; Save &amp; Finalise';
        if (r && r.success) {
          msg.textContent = '✓ Saved & finalised'; msg.className = 'save-all-msg ok';
          btn.style.display = 'none';
          if (orEl) orEl.disabled = true;
          if (taEl) taEl.disabled = true;
          setTimeout(function(){ msg.textContent = ''; }, 4000);
        } else {
          msg.textContent = '✗ ' + ((r && r.error) || 'Save failed');
          msg.className = 'save-all-msg err';
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false; btn.innerHTML = '&#128190; Save &amp; Finalise';
        msg.textContent = '✗ ' + ((err && err.message) || 'Error');
        msg.className = 'save-all-msg err';
      })
      .saveAuditFeedback(tabName, rowIndex, fbText, objText);
  } catch(e) {
    btn.disabled = false; btn.innerHTML = '&#128190; Save &amp; Finalise';
    msg.textContent = '✗ ' + e.message; msg.className = 'save-all-msg err';
  }
}

function toggleFeedback(id, toggleEl) {
  var body = document.getElementById(id);
  if (!body) return;
  var isOpen = body.classList.toggle('open');
  var icon   = toggleEl.querySelector('.feedback-toggle-icon');
  if (icon) icon.classList.toggle('open', isOpen);
  var lbl    = toggleEl.querySelector('.feedback-toggle-label');
  if (lbl)   lbl.textContent = isOpen
    ? '\u{1F916} AI Feedback — tap to collapse'
    : '\u{1F916} AI Feedback — tap to expand';
}

function printDetail() {
  // Expand all feedback bodies before printing so they appear in the printout
  document.querySelectorAll('.feedback-body').forEach(function(el) {
    el.classList.add('open');
  });
  window.print();
  // Collapse them again after print dialog closes
  setTimeout(function() {
    document.querySelectorAll('.feedback-body').forEach(function(el) {
      el.classList.remove('open');
    });
  }, 1000);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function avg(rows, key) {
  if (!rows.length) return 0;
  var s = 0;
  rows.forEach(function(r){ s += (Number(r[key]) || 0); });
  return Math.round(s / rows.length * 10) / 10;
}

function dbar(label, val, max) {
  var pct = Math.round(val / max * 100);
  var col = pct >= 88 ? '#2D6A2D' : pct >= 70 ? '#4a8a1a' : pct >= 50 ? '#8a7000' : '#a03000';
  return '<div class="dbar-row">' +
    '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<div class="dbar-label">' + esc(label) + '</div>' +
      '<div class="dbar-val">' + val + ' / ' + max + '</div>' +
    '</div>' +
    '<div class="dbar-track"><div class="dbar-fill" style="width:' + pct + '%;background:' + col + '"></div></div>' +
  '</div>';
}

function param(label, val) {
  var v   = val || 0;
  var col = v >= 4 ? '#ffffff8c' : v === 3 ? '#ffffff8c' : v === 2 ? '#ffffff8c' : '#ffffff8c';
  return '<div class="obs-param">' +
    '<div class="op-val" style="color:' + col + '">' + v + '<span style="font-size:11px;color:rgba(255,255,255,0.55)"> /4</span></div>' +
    '<div class="op-lbl">' + label + '</div>' +
  '</div>';
}

function ratingClass(r) {
  var m = { 'DISTINGUISHED':'rt-dist','PROFICIENT':'rt-prof','DEVELOPING':'rt-dev','BEGINNING':'rt-beg' };
  return m[(r||'').toUpperCase().trim()] || 'rt-dev';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function goToEntry() {
  try {
    var p = new URLSearchParams(window.location.search);
    google.script.run
      .withSuccessHandler(function(url) {
        window.top.location.href = url + '?page=form'
          + (p.get('name')  ? '&name='  + encodeURIComponent(p.get('name'))  : '')
          + (p.get('email') ? '&email=' + encodeURIComponent(p.get('email')) : '');
      })
      .withFailureHandler(function() { window.top.history.back(); })
      .getScriptUrl();
  } catch(e) { window.top.history.back(); }
}

function doLogout() {
  if (confirm('Log out?')) {
    try {
      google.script.run
        .withSuccessHandler(function(url) { window.top.location.href = url; })
        .withFailureHandler(function() { window.top.location.reload(); })
        .getScriptUrl();
    } catch(e) { window.top.location.reload(); }
  }
}
