<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Harvest International School &#8212; Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --harvest-blue: #29ABE2;
    --harvest-red:  #E8401C;
    --harvest-green:#2D6A2D;
    --bg-deep:    #0a1a0a;
    --bg-panel:   #0f2410;
    --bg-mid:     #1a3a1a;
    --accent:     #29ABE2;
    --green-light:#4a8c4a;
    --white:      #ffffff;
    --gray-200:   #d4e4d4;
    --gray-600:   #4a6a4a;
    --gray-800:   #1a2a1a;
    --danger:     #E8401C;
    --shadow-lg:  0 20px 60px rgba(0,0,0,0.55);
    --radius-sm:  10px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:"DM Sans",sans-serif;
    background:var(--bg-deep); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px; overflow-x:hidden;
  }
  body::before {
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(41,171,226,0.10) 0%,transparent 55%),
      radial-gradient(ellipse 50% 40% at 85% 90%,  rgba(45,106,45,0.14) 0%,transparent 55%),
      radial-gradient(ellipse 60% 40% at 90% 10%,  rgba(232,64,28,0.06) 0%,transparent 50%),
      linear-gradient(170deg,#0a1a0a 0%,#0f2410 50%,#0a1a0a 100%);
  }
  .login-card {
    position:relative; z-index:1;
    background:rgba(248,253,248,0.98);
    border-radius:24px; padding:40px 32px;
    width:100%; max-width:420px;
    box-shadow:var(--shadow-lg);
    border:1px solid rgba(45,106,45,0.2);
    animation:slideUp 0.45s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
  .brand { text-align:center; margin-bottom:32px; }
  .brand-logo { width:120px; height:auto; margin:0 auto 14px; display:block; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.25)); }
  .brand-name { font-family:"DM Serif Display",serif; font-size:18px; color:var(--bg-panel); line-height:1.25; letter-spacing:0.01em; }
  .brand-sub { font-size:11px; color:var(--harvest-green); text-transform:uppercase; letter-spacing:0.12em; margin-top:5px; font-weight:600; }
  .divider { border:none; border-top:1px solid var(--gray-200); margin:20px 0; }
  .form-heading { font-family:"DM Serif Display",serif; font-size:19px; color:var(--bg-panel); text-align:center; margin-bottom:24px; }
  .form-group { margin-bottom:18px; }
  label.field-label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.09em; color:var(--gray-600); margin-bottom:6px; }
  input[type="email"], input[type="password"] {
    width:100%; padding:14px 16px;
    border:2px solid var(--gray-200); border-radius:var(--radius-sm);
    font-family:"DM Sans",sans-serif; font-size:15px;
    color:var(--gray-800); background:var(--white);
    transition:border-color 0.2s,box-shadow 0.2s;
    outline:none; -webkit-appearance:none;
  }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(41,171,226,0.15); }
  .btn-primary {
    width:100%; padding:16px; border:none; border-radius:var(--radius-sm);
    font-family:"DM Sans",sans-serif; font-size:15px; font-weight:700;
    cursor:pointer; transition:all 0.2s; letter-spacing:0.03em;
    background:linear-gradient(135deg,var(--harvest-green),var(--green-light));
    color:var(--white); box-shadow:0 4px 16px rgba(45,106,45,0.35);
  }
  .btn-primary:active { transform:scale(0.98); }
  .btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .error-msg {
    background:rgba(232,64,28,0.08); border:1px solid rgba(232,64,28,0.3); color:var(--danger);
    padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; display:none;
  }
  .spinner { display:inline-block; width:17px; height:17px; border:3px solid rgba(255,255,255,0.3); border-top-color:var(--white); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>

  <hr class="divider">
  <div class="form-heading">Auditor/ Teacher Sign In</div>
  <div id="loginError" class="error-msg"></div>
  <div class="form-group">
    <label class="field-label">Email Address</label>
    <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label class="field-label">Password</label>
    <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
  </div>
  <button class="btn-primary" id="signInBtn" onclick="handleSignIn()">Sign In</button>
</div>
<script>
document.addEventListener('keydown', function(e){ if(e.key==='Enter') handleSignIn(); });
function handleSignIn(){
  var email=document.getElementById('loginEmail').value.trim();
  var password=document.getElementById('loginPassword').value.trim();
  var errEl=document.getElementById('loginError');
  var btn=document.getElementById('signInBtn');
  errEl.style.display='none';
  if(!email||!password){ showError(errEl,'Please enter your email and password.'); return; }
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Signing in...';
  google.script.run
    .withSuccessHandler(function(result){
      btn.disabled=false; btn.textContent='Sign In';
      if(result.success){
        // Store session server-side so AuditTeacher can read it
        google.script.run
          .withSuccessHandler(function(res){
            // res = { url, pendingDrafts[] }
            var url   = (typeof res === 'string') ? res : res.url;
            var drafts = (res && res.pendingDrafts) ? res.pendingDrafts : [];
            var role  = result.role || 'auditor';
            var page  = role === 'teacher' ? 'teacher' : 'form';
            var dest  = url + '?page=' + page;
            if (result.noReports) dest += '&noReports=1';

            // For auditors/SME: show pending drafts popup before navigating
            if (role !== 'teacher' && drafts.length > 0) {
              showDraftsPopup(drafts, dest);
            } else {
              try { window.top.location.href = dest; }
              catch(ex) { window.location.href = dest; }
            }
          })
          .storeSessionAndGetUrl(
            result.auditor.name,
            result.auditor.email,
            result.auditor.designation,
            result.role || 'auditor',
            result.auditor.location || '',
            result.auditor.sme      || ''
          );
      } else { showError(errEl, result.error||'Sign in failed.'); }
    })
    .withFailureHandler(function(err){
      btn.disabled=false; btn.textContent='Sign In';
      showError(errEl,'Error: '+err.message);
    })
    .signIn(email,password);
}
function showError(el,msg){ el.textContent=msg; el.style.display='block'; }
</script>

<!-- DRAFTS POPUP -->
<div id="draftsOverlay" style="display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);z-index:200;display:none;
  align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:18px;padding:28px 24px;
    max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4);
    font-family:'DM Sans',sans-serif;">
    <div style="font-family:'DM Serif Display',serif;font-size:20px;
      color:#1a2a1a;margin-bottom:8px;">&#128196; Pending Drafts</div>
    <div style="font-size:13px;color:#4a6a4a;margin-bottom:14px;">
      You have unsaved draft reports for the following teachers:
    </div>
    <div id="draftsList" style="background:#f0f7f0;border-radius:10px;
      padding:12px 16px;margin-bottom:18px;display:flex;flex-direction:column;gap:6px;">
    </div>
    <div style="font-size:12px;color:#5a7a5a;margin-bottom:18px;">
      Would you like to go to the Dashboard to review and finalise them now?
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="goToDashboardNow()" style="flex:1;padding:12px;
        background:linear-gradient(135deg,#2D6A2D,#4a8c4a);border:none;
        border-radius:9px;color:#fff;font-family:'DM Sans',sans-serif;
        font-size:14px;font-weight:700;cursor:pointer;">
        &#128202; Go to Dashboard
      </button>
      <button onclick="dismissDrafts()" style="flex:1;padding:12px;
        background:#f0f4f0;border:1px solid #c8dcc8;border-radius:9px;
        color:#3a5a3a;font-family:'DM Sans',sans-serif;
        font-size:14px;font-weight:600;cursor:pointer;">
        Later
      </button>
    </div>
  </div>
</div>

<script>
var _pendingDest = '';
var _dashDest    = '';

function showDraftsPopup(drafts, dest) {
  _pendingDest = dest;
  // Build dashboard dest (same URL but page=dashboard)
  _dashDest = dest.replace(/[?&]page=[^&]*/,'').replace(/&noReports=1/,'');
  _dashDest += (_dashDest.indexOf('?') >= 0 ? '&' : '?') + 'page=dashboard';

  var list = document.getElementById('draftsList');
  list.innerHTML = '';
  drafts.forEach(function(name) {
    var row = document.createElement('div');
    row.style.cssText = 'font-size:13px;font-weight:600;color:#1a3a1a;' +
      'display:flex;align-items:center;gap:8px;';
    row.innerHTML = '<span style="color:#2D6A2D;font-size:16px;">&#9654;</span>' + name;
    list.appendChild(row);
  });

  var overlay = document.getElementById('draftsOverlay');
  overlay.style.display = 'flex';
}

function goToDashboardNow() {
  document.getElementById('draftsOverlay').style.display = 'none';
  try { window.top.location.href = _dashDest; }
  catch(e) { window.location.href = _dashDest; }
}

function dismissDrafts() {
  document.getElementById('draftsOverlay').style.display = 'none';
  try { window.top.location.href = _pendingDest; }
  catch(e) { window.location.href = _pendingDest; }
}
</script>
</body>
</html>
